version: '3.8'

services:
  eg4-monitor:
    build:
      context: .
      dockerfile: Dockerfile.eg4_monitor
    container_name: eg4-web-monitor
    restart: always
    shm_size: '2gb'
    ports:
      - "8282:8282"
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=America/Phoenix
      - FLASK_ENV=production
      - LOG_LEVEL=INFO
    volumes:
      # Mount .env file for credentials
      - ./.env:/app/.env:ro
      # Mount templates for live updates during development
      - ./templates:/app/templates:ro
      # Persist browser data
      - eg4_browser_data:/home/pwuser/.cache
      # Persist logs
      - ./logs:/tmp:rw
    networks:
      - monitor-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8282/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  monitor-network:
    driver: bridge

volumes:
  eg4_browser_data: